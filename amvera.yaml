runtime: python310
build:
  system_packages:
    - libgl1-mesa-glx
    - libglib2.0-0
  python_packages:
    - fastapi
    - uvicorn
    - python-multipart
    - numpy
    - Pillow
    - opencv-python-headless
    - scikit-image
    - scipy
run:
  command: uvicorn main:app --host 0.0.0.0 --port 80
  port: 80
